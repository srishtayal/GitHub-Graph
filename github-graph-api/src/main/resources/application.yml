spring:
  application:
    name: github-graph-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/github_graph}
    username: ${SPRING_DATASOURCE_USERNAME:github_graph}
    password: ${SPRING_DATASOURCE_PASSWORD:github_graph}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:githubgraph}
  data:
    neo4j:
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

github-graph:
  analysis:
    base-url: ${ANALYSIS_BASE_URL:http://localhost:8000}
  clone:
    root: ${REPOSITORY_CLONE_ROOT:/tmp/github-graph/repos}
    timeout-seconds: ${REPOSITORY_CLONE_TIMEOUT_SECONDS:120}
    max-size-bytes: ${REPOSITORY_CLONE_MAX_SIZE_BYTES:262144000}
    poll-interval-millis: ${REPOSITORY_CLONE_POLL_INTERVAL_MILLIS:250}
  github:
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
    token: ${GITHUB_TOKEN:}
  neo4j-initialization:
    max-attempts: ${NEO4J_INITIALIZATION_MAX_ATTEMPTS:12}
    initial-backoff-millis: ${NEO4J_INITIALIZATION_INITIAL_BACKOFF_MILLIS:500}
    max-backoff-millis: ${NEO4J_INITIALIZATION_MAX_BACKOFF_MILLIS:5000}
